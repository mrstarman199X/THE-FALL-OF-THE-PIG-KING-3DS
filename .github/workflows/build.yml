name: Build 3DS CIA File
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Run LoveBrew Compiler
        uses: LoveBrew/LoveBrew@v1
        with:
          game_file: 'game.love'
          title: 'THE FALL OF THE PIG KING'
          author: 'Artist'
          description: 'An UNDERTALE x MOTHER 3 Engine'
          icon: 'icon.png'

      - name: Upload Finished CIA Package
        uses: actions/upload-artifact@v4
        with:
          name: PigKing_3DS_Installation
          path: build/*.cia
